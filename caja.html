<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PALMA - CAJA</title>
  <link rel="icon" type="image/x-icon" href="./logo_palma.ico">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 
            sans: ['Montserrat', 'sans-serif'] 
          },
          colors: {
            brand: { 
                DEFAULT: '#1a7c3e', 
                light: '#25a355', 
                muted: '#e8f5ee', 
                border: '#b6dfc6' 
            },
            danger: { DEFAULT: '#d66666', light: '#fee2e2' }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .table-scroll::-webkit-scrollbar { width: 6px; }
    .table-scroll::-webkit-scrollbar-thumb { background: #b6dfc6; border-radius: 10px; }
  </style>
</head>

<body class="h-screen bg-[#f0f4f1] overflow-hidden flex flex-col p-4">

  <div class="bg-white rounded-2xl shadow-xl w-full h-full flex flex-col overflow-hidden border border-brand-border">

    <div class="flex items-center justify-between border-b border-gray-100 bg-white">
      <div class="flex overflow-x-auto">
        <button class="px-8 py-5 text-[11px] font-black uppercase text-brand border-b-4 border-brand tracking-widest transition-all">
            Caja
        </button>
        <button class="px-8 py-5 text-[11px] font-bold uppercase text-gray-400 hover:text-brand border-b-4 border-transparent hover:border-brand-border transition-all tracking-widest text-center leading-tight">
            Factura<br>Electrónica
        </button>
        <button class="px-8 py-5 text-[11px] font-bold uppercase text-gray-400 hover:text-brand border-b-4 border-transparent hover:border-brand-border transition-all tracking-widest">
            Devoluciones
        </button>
        <button class="px-8 py-5 text-[11px] font-bold uppercase text-gray-400 hover:text-brand border-b-4 border-transparent hover:border-brand-border transition-all tracking-widest text-center leading-tight">
            Recibo<br>Proveedores
        </button>
      </div>
      
      <button onclick="window.history.back()" class="mr-6 w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-brand font-black hover:bg-red-50 hover:text-danger hover:border-red-200 transition-all active:scale-90">
        X
      </button>
    </div>

    <div class="flex-1 flex overflow-hidden">
      
      <div class="w-80 bg-gray-50/50 border-r border-gray-100 p-6 flex flex-col gap-5">
        
        <div class="bg-brand text-white p-7 rounded-[25px] shadow-lg">
          <p class="text-[10px] font-black uppercase opacity-80 mb-1 tracking-wider">Total a pagar:</p>
          <h2 id="displayTotal" class="text-5xl font-black tracking-tighter">$0</h2>
        </div>

        <div class="bg-white border-2 border-brand-border p-7 rounded-[25px]">
          <p class="text-[10px] font-black uppercase text-brand mb-1 tracking-wider">Efectivo:</p>
          <input type="number" id="inputEfectivo" oninput="actualizarCambio()" placeholder="0" class="text-4xl font-black text-brand-light w-full outline-none bg-transparent">
        </div>

        <div class="bg-danger/10 border-2 border-danger/20 p-7 rounded-[25px] mt-auto">
          <p class="text-[10px] font-black uppercase text-danger mb-1 tracking-wider">Cambio:</p>
          <h2 id="displayCambio" class="text-4xl font-black text-danger tracking-tighter">$0</h2>
        </div>
      </div>

      <div class="flex-1 flex flex-col p-8 overflow-hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-black text-brand uppercase tracking-tighter">Facturación</h1>
            <div class="text-right">
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest">ID Operación</p>
                <p id="opID" class="font-bold text-gray-500">#0000-2026</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto table-scroll pr-2">
            <table class="w-full text-sm">
              <thead class="text-left text-[11px] font-black text-brand/50 uppercase border-b border-gray-100 sticky top-0 bg-white pb-4">
                <tr>
                  <th class="pb-4 tracking-widest">ID</th>
                  <th class="pb-4 tracking-widest">Nombre del Producto</th>
                  <th class="pb-4 text-center tracking-widest">Cantidad/Peso</th>
                  <th class="pb-4 text-right tracking-widest">Precio Unitario</th>
                </tr>
              </thead>
              <tbody id="tablaBody" class="text-gray-600">
                </tbody>
            </table>
        </div>
      </div>
    </div>

    <div class="px-8 py-5 border-t border-gray-100 bg-white flex justify-between items-center">
        <button onclick="cobrar()" class="bg-brand text-white px-16 py-4 rounded-[18px] text-lg font-black hover:bg-brand-light hover:scale-105 active:scale-95 transition-all shadow-xl shadow-brand/20 uppercase tracking-widest">
            Cobrar
        </button>

        <div class="flex gap-4">
            <button onclick="agregarProducto()" class="px-8 py-4 bg-white border-2 border-brand-border text-brand rounded-[18px] text-xs font-black hover:bg-brand-muted transition-all uppercase tracking-widest">
                Agregar
            </button>
            <button onclick="eliminarProducto()" class="px-8 py-4 bg-white border-2 border-gray-100 text-gray-400 rounded-[18px] text-xs font-black hover:bg-red-50 hover:text-danger hover:border-red-100 transition-all uppercase tracking-widest">
                Eliminar
            </button>
            <button onclick="modificarProducto()" class="px-8 py-4 bg-white border-2 border-gray-100 text-gray-400 rounded-[18px] text-xs font-black hover:bg-gray-50 hover:text-brand transition-all uppercase tracking-widest">
                Modificar
            </button>
            <button onclick="buscarProducto()" class="px-8 py-4 bg-white border-2 border-gray-100 text-gray-400 rounded-[18px] text-xs font-black hover:bg-gray-50 hover:text-brand transition-all uppercase tracking-widest">
                Buscar
            </button>
        </div>
    </div>

  </div>

  <script>
    let productosVenta = [];
    let totalActual = 0;

    // Generar ID de operación al cargar
    window.onload = () => {
        document.getElementById('opID').textContent = `#${Math.floor(Math.random()*9000)+1000}-2026`;
    };

    function renderTabla() {
        const tbody = document.getElementById('tablaBody');
        tbody.innerHTML = '';
        totalActual = 0;

        if (productosVenta.length === 0) {
            tbody.innerHTML = '<tr class="border-b border-gray-50"><td colspan="4" class="py-5 text-center text-gray-200 italic text-xs">... lista de productos en espera ...</td></tr>';
        } else {
            productosVenta.forEach((p, index) => {
                totalActual += p.precio * p.cantidad;
                tbody.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-brand-muted/40 transition-colors group cursor-pointer">
                        <td class="py-5 font-mono text-xs text-gray-400">${p.id}</td>
                        <td class="py-5 font-bold text-gray-700">${p.nombre}</td>
                        <td class="py-5 text-center font-bold text-brand">${p.cantidad}</td>
                        <td class="py-5 text-right font-black text-gray-800">$${p.precio.toLocaleString()}</td>
                    </tr>
                `;
            });
        }
        document.getElementById('displayTotal').textContent = `$${totalActual.toLocaleString()}`;
        actualizarCambio();
    }

    function agregarProducto() {
        const nombre = prompt("Nombre del producto:");
        const cantidad = parseFloat(prompt("Cantidad o Peso (ej: 2.5):"));
        const precio = parseInt(prompt("Precio Unitario:"));

        if (nombre && cantidad && precio) {
            const nuevoProd = {
                id: 1000 + productosVenta.length + 1,
                nombre: nombre,
                cantidad: cantidad,
                precio: precio
            };
            productosVenta.push(nuevoProd);
            renderTabla();
        }
    }

    function eliminarProducto() {
        const idBusqueda = prompt("Ingrese el ID del producto a eliminar:");
        productosVenta = productosVenta.filter(p => p.id != idBusqueda);
        renderTabla();
    }

    function modificarProducto() {
        const idBusqueda = prompt("Ingrese el ID del producto a modificar:");
        const prod = productosVenta.find(p => p.id == idBusqueda);
        
        if (prod) {
            prod.nombre = prompt("Nuevo nombre:", prod.nombre) || prod.nombre;
            prod.cantidad = parseFloat(prompt("Nueva cantidad:", prod.cantidad)) || prod.cantidad;
            prod.precio = parseInt(prompt("Nuevo precio:", prod.precio)) || prod.precio;
            renderTabla();
        } else {
            alert("Producto no encontrado.");
        }
    }

    function buscarProducto() {
        const busqueda = prompt("Buscar producto por nombre:").toLowerCase();
        const filas = document.querySelectorAll('#tablaBody tr');
        
        filas.forEach(fila => {
            const nombre = fila.children[1]?.textContent.toLowerCase();
            if (nombre) {
                fila.style.display = nombre.includes(busqueda) ? "" : "none";
            }
        });
    }

    function actualizarCambio() {
        const efectivo = parseInt(document.getElementById('inputEfectivo').value) || 0;
        const cambio = efectivo - totalActual;
        document.getElementById('displayCambio').textContent = `$${cambio > 0 ? cambio.toLocaleString() : 0}`;
    }

    function cobrar() {
        const efectivo = parseInt(document.getElementById('inputEfectivo').value) || 0;
        if (totalActual === 0) return alert("No hay productos en la venta.");
        if (efectivo < totalActual) return alert("Efectivo insuficiente.");

        alert(`VENTA EXITOSA\nTotal: $${totalActual.toLocaleString()}\nCambio: $${(efectivo - totalActual).toLocaleString()}`);
        
        // Limpiar para nueva venta
        productosVenta = [];
        document.getElementById('inputEfectivo').value = '';
        document.getElementById('opID').textContent = `#${Math.floor(Math.random()*9000)+1000}-2026`;
        renderTabla();
    }
  </script>
</body>
</html>
