<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PALMA - CAJA</title>
  <link rel="icon" type="image/x-icon" href="./logo_palma.ico">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 
            sans: ['Montserrat', 'sans-serif'] 
          },
          colors: {
            brand: { 
                DEFAULT: '#1a7c3e', 
                light: '#25a355', 
                muted: '#e8f5ee', 
                border: '#b6dfc6' 
            },
            danger: { DEFAULT: '#d66666', light: '#fee2e2' }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .table-scroll::-webkit-scrollbar { width: 6px; }
    .table-scroll::-webkit-scrollbar-thumb { background: #b6dfc6; border-radius: 10px; }
    
    .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body class="h-screen bg-[#f0f4f1] overflow-hidden flex flex-col p-4">

  <div class="bg-white rounded-2xl shadow-xl w-full h-full flex flex-col overflow-hidden border border-brand-border">

    <div class="flex items-center justify-between border-b border-gray-100 bg-white pr-6">
      <div class="flex overflow-x-auto">
        <button class="px-8 py-5 text-[11px] font-black uppercase text-brand border-b-4 border-brand tracking-widest transition-all">
            Caja
        </button>
        <button class="px-8 py-5 text-[11px] font-bold uppercase text-gray-400 hover:text-brand border-b-4 border-transparent hover:border-brand-border transition-all tracking-widest text-center leading-tight">
            Factura<br>Electrónica
        </button>
        <button class="px-8 py-5 text-[11px] font-bold uppercase text-gray-400 hover:text-brand border-b-4 border-transparent hover:border-brand-border transition-all tracking-widest">
            Devoluciones
        </button>
        <button class="px-8 py-5 text-[11px] font-bold uppercase text-gray-400 hover:text-brand border-b-4 border-transparent hover:border-brand-border transition-all tracking-widest text-center leading-tight">
            Recibo<br>Proveedores
        </button>
      </div>
      
      <div class="flex items-center gap-5">
        <div class="flex items-center gap-3 text-right">
            <div>
                <h2 id="cajaUserName" class="text-[11px] font-black text-brand leading-none">Cargando...</h2>
                <p class="text-[9px] font-bold text-gray-400 uppercase mt-1">Cajero</p>
            </div>
            <div class="w-10 h-10 bg-brand-muted rounded-full border border-brand-border flex items-center justify-center overflow-hidden">
                <img id="userPhoto" src="" class="w-full h-full object-cover">
            </div>
        </div>

        <button onclick="cerrarSesion()" class="px-4 py-2 bg-white text-red-600 rounded-[10px] text-[10px] font-bold shadow-sm border border-red-50 hover:bg-red-600 hover:text-white transition-all active:scale-95">
            Cerrar sesión
        </button>

        <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-brand font-black hover:bg-red-50 hover:text-danger hover:border-red-200 transition-all active:scale-90">
            X
        </button>
      </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
      
      <div class="w-80 bg-gray-50/50 border-r border-gray-100 p-6 flex flex-col gap-5">
        <div class="bg-brand text-white p-7 rounded-[25px] shadow-lg">
          <p class="text-[10px] font-black uppercase opacity-80 mb-1 tracking-wider">Total a pagar:</p>
          <h2 id="displayTotal" class="text-5xl font-black tracking-tighter">$0</h2>
        </div>

        <div class="bg-white border-2 border-brand-border p-7 rounded-[25px]">
          <p class="text-[10px] font-black uppercase text-brand mb-1 tracking-wider">Efectivo:</p>
          <input type="number" id="inputEfectivo" oninput="actualizarCambio()" placeholder="0" class="text-4xl font-black text-brand-light w-full outline-none bg-transparent">
        </div>

        <div class="bg-danger/10 border-2 border-danger/20 p-7 rounded-[25px] mt-auto">
          <p class="text-[10px] font-black uppercase text-danger mb-1 tracking-wider">Cambio:</p>
          <h2 id="displayCambio" class="text-4xl font-black text-danger tracking-tighter">$0</h2>
        </div>
      </div>

      <div class="flex-1 flex flex-col p-8 overflow-hidden">
        <div class="mb-8">
            <h1 class="text-4xl font-black text-brand uppercase tracking-tighter">Facturación</h1>
        </div>

        <div class="flex-1 overflow-y-auto table-scroll pr-2">
            <table class="w-full text-sm">
              <thead class="text-left text-[11px] font-black text-brand/50 uppercase border-b border-gray-100 sticky top-0 bg-white pb-4">
                <tr>
                  <th class="pb-4 tracking-widest">ID</th>
                  <th class="pb-4 tracking-widest">Nombre del Producto</th>
                  <th class="pb-4 text-center tracking-widest">Cantidad/Peso</th>
                  <th class="pb-4 text-right tracking-widest">Precio Unitario</th>
                </tr>
              </thead>
              <tbody id="tablaBody" class="text-gray-600">
              </tbody>
            </table>
        </div>
      </div>
    </div>

    <div class="px-8 py-5 border-t border-gray-100 bg-white flex justify-between items-center">
        <button onclick="cobrar()" class="bg-brand text-white px-16 py-4 rounded-[18px] text-lg font-black hover:bg-brand-light hover:scale-105 active:scale-95 transition-all shadow-xl shadow-brand/20 uppercase tracking-widest">
            Cobrar
        </button>

        <div class="flex gap-4">
            <button onclick="agregarProducto()" class="px-8 py-4 bg-white border-2 border-brand-border text-brand rounded-[18px] text-xs font-black hover:bg-brand-muted transition-all uppercase tracking-widest">
                Agregar
            </button>
            <button onclick="eliminarProducto()" class="px-8 py-4 bg-white border-2 border-gray-100 text-gray-400 rounded-[18px] text-xs font-black hover:bg-red-50 hover:text-danger hover:border-red-100 transition-all uppercase tracking-widest">
                Eliminar
            </button>
            <button onclick="modificarProducto()" class="px-8 py-4 bg-white border-2 border-gray-100 text-gray-400 rounded-[18px] text-xs font-black hover:bg-gray-50 hover:text-brand transition-all uppercase tracking-widest">
                Modificar
            </button>
            <button onclick="buscarProducto()" class="px-8 py-4 bg-white border-2 border-gray-100 text-gray-400 rounded-[18px] text-xs font-black hover:bg-gray-50 hover:text-brand transition-all uppercase tracking-widest">
                Buscar
            </button>
        </div>
    </div>

  </div>

  <div id="modalContainer" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] hidden z-50 flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden border border-brand-border">
          <div class="px-8 pt-8 flex justify-between items-center">
              <h3 id="modalTitle" class="text-xl font-black text-brand uppercase tracking-tighter">Título</h3>
              <button onclick="cerrarModal()" class="text-gray-300 hover:text-danger font-black text-xl">×</button>
          </div>
          <div id="modalBody" class="p-8"></div>
          <div id="modalFooter" class="px-8 pb-8 flex justify-end gap-3"></div>
      </div>
  </div>

  <script>
    let productosVenta = [];
    let totalActual = 0;

    window.onload = () => {
        // Cargar Datos del Usuario
        const nombreGuardado = sessionStorage.getItem('usuarioNombre') || "Edwin Acosta";
        document.getElementById('cajaUserName').textContent = nombreGuardado;
        document.getElementById('userPhoto').src = `https://ui-avatars.com/api/?name=${nombreGuardado}&background=e8f5ee&color=1a7c3e&bold=true`;
        
        renderTabla();
    };

    function cerrarSesion() {
        if(confirm("¿Estás seguro de que deseas cerrar la sesión?")) {
            sessionStorage.clear();
            window.location.href = 'login.html'; 
        }
    }

    // Funciones del Sistema de Modales
    function abrirModal(titulo, cuerpo, footer) {
        document.getElementById('modalTitle').textContent = titulo;
        document.getElementById('modalBody').innerHTML = cuerpo;
        document.getElementById('modalFooter').innerHTML = footer;
        document.getElementById('modalContainer').classList.add('modal-active');
    }

    function cerrarModal() {
        document.getElementById('modalContainer').classList.remove('modal-active');
    }

    function renderTabla() {
        const tbody = document.getElementById('tablaBody');
        tbody.innerHTML = '';
        totalActual = 0;

        if (productosVenta.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-gray-200 italic text-xs uppercase tracking-widest">Esperando productos...</td></tr>';
        } else {
            productosVenta.forEach((p) => {
                totalActual += p.precio * p.cantidad;
                tbody.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-brand-muted/40 transition-colors group cursor-pointer">
                        <td class="py-5 font-mono text-xs text-gray-400">${p.id}</td>
                        <td class="py-5 font-bold text-gray-700 uppercase text-xs">${p.nombre}</td>
                        <td class="py-5 text-center font-bold text-brand">${p.cantidad}</td>
                        <td class="py-5 text-right font-black text-gray-800">$${p.precio.toLocaleString()}</td>
                    </tr>`;
            });
        }
        document.getElementById('displayTotal').textContent = `$${totalActual.toLocaleString()}`;
        actualizarCambio();
    }

    function agregarProducto() {
        const cuerpo = `
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-brand uppercase tracking-widest">Nombre del Producto</label>
                    <input type="text" id="addNombre" class="w-full p-3 bg-brand-muted rounded-xl font-bold text-brand outline-none mt-1">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-brand uppercase tracking-widest">Cant / Peso</label>
                        <input type="number" id="addCant" class="w-full p-3 bg-brand-muted rounded-xl font-bold text-brand outline-none mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-brand uppercase tracking-widest">Precio Unitario</label>
                        <input type="number" id="addPrecio" class="w-full p-3 bg-brand-muted rounded-xl font-bold text-brand outline-none mt-1">
                    </div>
                </div>
            </div>`;
        const footer = `
            <button onclick="cerrarModal()" class="px-6 py-2 font-black text-gray-400 uppercase text-xs">Cancelar</button>
            <button onclick="confirmarAgregar()" class="bg-brand text-white px-8 py-3 rounded-xl font-black uppercase text-xs">Añadir</button>`;
        abrirModal("Nuevo Item", cuerpo, footer);
    }

    function confirmarAgregar() {
        const n = document.getElementById('addNombre').value;
        const c = parseFloat(document.getElementById('addCant').value);
        const p = parseInt(document.getElementById('addPrecio').value);
        if (n && c && p) {
            productosVenta.push({ id: 1000 + productosVenta.length + 1, nombre: n, cantidad: c, precio: p });
            renderTabla();
            cerrarModal();
        }
    }

    function eliminarProducto() {
        let items = productosVenta.map(p => `
            <label class="flex items-center justify-between p-3 hover:bg-red-50 rounded-xl cursor-pointer">
                <div class="flex items-center gap-3">
                    <input type="checkbox" value="${p.id}" class="accent-danger w-4 h-4">
                    <span class="font-bold text-gray-600 text-xs uppercase">${p.nombre}</span>
                </div>
                <span class="text-[10px] font-black text-gray-300">ID: ${p.id}</span>
            </label>`).join('');

        const cuerpo = `<div class="space-y-1 max-h-60 overflow-y-auto">${items || '<p class="text-center text-gray-300 py-4 text-xs">LISTA VACÍA</p>'}</div>`;
        const footer = `
            <button onclick="cerrarModal()" class="px-6 py-2 font-black text-gray-400 uppercase text-xs">Cancelar</button>
            <button onclick="confirmarEliminar()" class="bg-danger text-white px-8 py-3 rounded-xl font-black uppercase text-xs">Eliminar</button>`;
        abrirModal("Quitar de Factura", cuerpo, footer);
    }

    function confirmarEliminar() {
        const checks = document.querySelectorAll('#modalBody input[type="checkbox"]:checked');
        if (checks.length > 0 && confirm("¿Eliminar seleccionados?")) {
            const ids = Array.from(checks).map(c => parseInt(c.value));
            productosVenta = productosVenta.filter(p => !ids.includes(p.id));
            renderTabla();
        }
        cerrarModal();
    }

    function modificarProducto() {
        const cuerpo = `
            <div class="space-y-4">
                <label class="text-[10px] font-black text-brand uppercase tracking-widest">Ingresa el ID del producto</label>
                <input type="number" id="modID" oninput="buscarParaMod()" class="w-full p-4 bg-brand-muted rounded-xl font-black text-brand text-center text-xl outline-none border-2 border-transparent focus:border-brand">
                <div id="modCampos" class="hidden space-y-4 pt-4 border-t border-gray-100 animate-pulse">
                    <input type="text" id="modNombre" class="w-full p-3 bg-gray-50 rounded-xl font-bold" placeholder="Nombre">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="modCant" class="p-3 bg-gray-50 rounded-xl font-bold" placeholder="Cant">
                        <input type="number" id="modPrecio" class="p-3 bg-gray-50 rounded-xl font-bold" placeholder="Precio">
                    </div>
                </div>
            </div>`;
        const footer = `<button onclick="confirmarModificar()" class="bg-brand text-white px-8 py-3 rounded-xl font-black uppercase text-xs w-full">Guardar Cambios</button>`;
        abrirModal("Editar Item", cuerpo, footer);
    }

    function buscarParaMod() {
        const id = document.getElementById('modID').value;
        const p = productosVenta.find(x => x.id == id);
        const div = document.getElementById('modCampos');
        if (p) {
            div.classList.remove('hidden', 'animate-pulse');
            document.getElementById('modNombre').value = p.nombre;
            document.getElementById('modCant').value = p.cantidad;
            document.getElementById('modPrecio').value = p.precio;
        } else {
            div.classList.add('hidden');
        }
    }

    function confirmarModificar() {
        const id = document.getElementById('modID').value;
        const p = productosVenta.find(x => x.id == id);
        if (p) {
            p.nombre = document.getElementById('modNombre').value;
            p.cantidad = parseFloat(document.getElementById('modCant').value);
            p.precio = parseInt(document.getElementById('modPrecio').value);
            renderTabla();
            cerrarModal();
        }
    }

    function buscarProducto() {
        const cuerpo = `
            <div class="space-y-4">
                <input type="text" id="searchInp" oninput="filtrarVenta()" class="w-full p-4 bg-brand-muted rounded-2xl font-bold text-brand outline-none" placeholder="Escribe el nombre aquí...">
                <p class="text-center text-[10px] font-black text-brand/30 uppercase">La tabla se filtrará automáticamente</p>
            </div>`;
        const footer = `<button onclick="cerrarModal()" class="px-8 py-3 bg-brand text-white rounded-xl font-black uppercase text-xs w-full">Hecho</button>`;
        abrirModal("Buscador de Venta", cuerpo, footer);
    }

    function filtrarVenta() {
        const val = document.getElementById('searchInp').value.toLowerCase();
        document.querySelectorAll('#tablaBody tr').forEach(tr => {
            tr.style.display = tr.textContent.toLowerCase().includes(val) ? "" : "none";
        });
    }

    function actualizarCambio() {
        const ef = parseInt(document.getElementById('inputEfectivo').value) || 0;
        const cam = ef - totalActual;
        document.getElementById('displayCambio').textContent = `$${cam > 0 ? cam.toLocaleString() : 0}`;
    }

    function cobrar() {
        const ef = parseInt(document.getElementById('inputEfectivo').value) || 0;
        if (totalActual === 0) return alert("No hay productos.");
        if (ef < totalActual) return alert("Efectivo insuficiente.");

        alert(`COBRO EXITOSO\nTotal: $${totalActual.toLocaleString()}\nCambio: $${(ef - totalActual).toLocaleString()}`);
        productosVenta = [];
        document.getElementById('inputEfectivo').value = '';
        renderTabla();
    }
  </script>
</body>
</html>
