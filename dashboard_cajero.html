<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALMA - CAJERO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            vibrant: '#008f39', // Verde del fondo
                            dark: '#2d571b',    // Verde oscuro de la tarjeta Ventas
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        
        /* Animación suave para las tarjetas */
        .menu-card {
            transition: all 0.2s ease-in-out;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            filter: brightness(1.05);
        }
    </style>
</head>

<body class="bg-brand-vibrant h-screen w-screen overflow-hidden flex flex-col p-12">

    <div class="flex-1 flex flex-col justify-center max-w-5xl mx-auto w-full gap-6">
        
        <div class="menu-card bg-brand-dark rounded-[35px] h-64 flex items-center justify-center shadow-2xl cursor-pointer">
            <h2 class="text-white text-3xl font-black tracking-[0.2em] uppercase">Ventas</h2>
        </div>

        <div class="grid grid-cols-3 gap-6 h-64">
            <div class="menu-card bg-white rounded-[35px] flex items-center justify-center shadow-xl cursor-pointer group">
                <h2 class="text-brand-vibrant text-2xl font-black tracking-[0.1em] uppercase group-hover:scale-110 transition-transform">Finanzas</h2>
            </div>
            
            <div class="menu-card bg-white rounded-[35px] flex items-center justify-center shadow-xl cursor-pointer group">
                <h2 class="text-brand-vibrant text-2xl font-black tracking-[0.1em] uppercase group-hover:scale-110 transition-transform">Personal</h2>
            </div>
            
            <div class="menu-card bg-white rounded-[35px] flex items-center justify-center shadow-xl cursor-pointer group">
                <h2 class="text-brand-vibrant text-2xl font-black tracking-[0.1em] uppercase group-hover:scale-110 transition-transform">Inventarios</h2>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center w-full max-w-5xl mx-auto mt-12 px-4">
        
        <div class="flex items-center gap-5">
            <div class="w-16 h-16 bg-[#e0e0e0] rounded-full"></div>
            <div class="text-white">
                <h3 class="text-2xl font-bold leading-tight tracking-tight">Edwin Acosta</h3>
                <p class="text-sm font-medium opacity-90">Cajero</p>
            </div>
        </div>

        <div class="text-white text-right">
            <div id="clock" class="text-5xl font-black tracking-tighter">10:12</div>
            <div class="text-sm font-bold mt-1">Viernes 27 Marzo, 2026</div>
        </div>
    </div>

    <script>
        // Función para mantener el reloj actualizado
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
